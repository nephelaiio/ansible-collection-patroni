---
name: libvirt
on:
  pull_request:
    branches:
      - master
    paths:
      - "*"
      - "!README.md"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  libvirt:
    name: libvirt
    runs-on: libvirt
    strategy:
      matrix:
        scenario:
          - update
          - install
          - databases
          - fdw
          - standby
        image:
          - https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
    env:
      MOLECULE_OUTPUT_DIR: /tmp/logs
    steps:
      - name: Run devbox tests
        uses: pokerops/ansible-utils@master
        with:
          run: >
            just
            --set MOLECULE_SCENARIO ${{ matrix.scenario }}
            --set MOLECULE_KVM_IMAGE ${{ matrix.image }}
            requirements test

      - name: Upload install logs
        uses: actions/upload-artifact@v7
        with:
          name: install-${{ matrix.scenario }}-${{ matrix.image.distro }}.log
          path: |
            ${MOLECULE_OUTPUT_DIR}/*
          if-no-files-found: ignore
        if: always()
