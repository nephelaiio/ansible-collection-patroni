        _db_source: "{{ _server.source }}"
        _foreign_server: "{{ _server.foreign_server }}"
        _db_remote: "{{ _server.remote }}"
        _schema: "{{ _table.source_schema }}"
        _table_name: "{{ _schema }}.{{ _table.name }}"
