---
- name: Set cluster facts
  ansible.builtin.import_playbook: nephelaiio.patroni.facts

- name: Create tables and schemas
  hosts: _patroni_cluster_master
  become: true
  vars_files:
    - ../../../playbooks/vars/main.yml
  tasks:
    - name: Set PostgreSQL facts
      ansible.builtin.include_role:
        name: nephelaiio.patroni.postgresql
        tasks_from: vars.yml

    - name: Set PostgreSQL FDW fact
      ansible.builtin.set_fact:
        _patroni_fdw_databases: "{{ _output | flatten }}"
      vars:
        _default:
          state: present
        _input: "{{ _patroni_cluster_fdw | dict2items | sort(attribute='key') }}"
        _value: "{{ _input | map(attribute='value') }}"
        _default_value: "{{ [[_default]] | product(_value) | map('nephelaiio.plugins.inner_product') | map('map', 'combine') }}"
        _remote_data: "{{ _input | map(attribute='key') }}"
        _remote: "{{ _remote_data | map('nephelaiio.plugins.to_dict', 'remote') | map('nephelaiio.plugins.cons') }}"
        _source_data: "{{ _default_value | map('map', attribute='source') }}"
        _source: "{{ _source_data | map('map', 'nephelaiio.plugins.to_dict', 'source') }}"
        _src_remote: "{{ _remote | zip(_source) | map('nephelaiio.plugins.inner_product') | map('map', 'combine') }}"
        _tables_data: "{{ _default_value | map('map', attribute='tables') | map('map', 'dict2items') }}"
        _tables: "{{ _tables_data | map('map', 'nephelaiio.plugins.to_dict', 'tables') | map('nephelaiio.plugins.cons') | flatten(1) }}"
        _remote_tables: "{{ _src_remote | zip(_tables) | map('nephelaiio.plugins.pairs') | map('map', 'combine') }}"
        _users_data: "{{ _default_value | map('map', attribute='users') | map('map', 'dict2items') }}"
        _users: "{{ _users_data | map('map', 'nephelaiio.plugins.to_dict', 'users') | map('nephelaiio.plugins.cons') | flatten(1) }}"
        _users_tables: "{{ _remote_tables | zip(_users) | map('nephelaiio.plugins.pairs') | map('map', 'combine') }}"
        _states: "{{ _default_value | map('map', 'nephelaiio.plugins.select_attributes', ['state']) }}"
        _output: "{{ _users_tables | zip(_states) | map('nephelaiio.plugins.pairs') | map('map', 'combine') }}"

    - name: Create schemas
      community.postgresql.postgresql_schema:
        login_db: "{{ _db }}"
        login_port: "{{ _patroni_haproxy_port_psql_master_local }}"
        name: "{{ _name }}"
      vars:
        _name: "{{ item.1.value.source_schema | default('public') }}"
        _db: "{{ item.0.source }}"
      loop_control:
        label: "Schema: {{ _name }} - Database: {{ _db }}"
      loop: "{{ _patroni_fdw_databases | subelements('tables') }}"
      become_user: "{{ _postgresql_user }}"

    - name: Create tables
      community.postgresql.postgresql_table:
        login_db: "{{ _db }}"
        login_port: "{{ _patroni_haproxy_port_psql_master_local }}"
        name: "{{ _schema }}.{{ _name }}"
        columns: "{{ item.1.value.columns }}"
      vars:
        _schema: "{{ item.1.value.source_schema | default('public') }}"
        _name: "{{ item.1.key }}"
        _db: "{{ item.0.source }}"
      loop_control:
        label: "Table: {{ _name }} - Database: {{ _db }}"
      loop: "{{ _patroni_fdw_databases | subelements('tables') }}"
      become_user: "{{ _postgresql_user }}"

- name: Run nephelaiio.patroni.fdw playbook
  ansible.builtin.import_playbook: nephelaiio.patroni.fdw

- name: Import verify playbook
  ansible.builtin.import_playbook: ./verify.yml

- name: Override Foreign Data Wrapper data
  hosts: all
  vars_files:
    - ../../../playbooks/vars/main.yml
  tasks:
    - name: Override fdw fact
      ansible.builtin.set_fact:
        patroni_cluster_fdw:
          remote_molecule:
            - source: "{{ patroni_molecule_database }}"
              users:
                molecule:
                  password: "{{ patroni_molecule_password }}"
                test:
                  password: "{{ patroni_test_password }}"
              tables:
                molecule_table1:
                  columns:
                    - Username character varying(50) NOT NULL
                    - CountryId integer NOT NULL
            - source: "{{ patroni_test_database }}"
              users:
                test:
                  password: "{{ patroni_test_password }}"
              tables:
                molecule_table3:
                  columns:
                    - Username character varying(50) NOT NULL
                    - CountryId integer NOT NULL
          remote_test:
            - source: "{{ patroni_test_database }}"
              users:
                molecule:
                  password: "{{ patroni_molecule_password }}"
              tables:
                test_table1:
                  columns:
                    - Username character varying(50) NOT NULL
                    - CountryId integer NOT NULL
          remote_BlaDB:
            - source: "{{ patroni_bladb_database }}"
              remote: "{{ patroni_fdw_remote_prefix }}_{{ patroni_bladb_database }}"
              users:
                molecule:
                  password: "{{ patroni_molecule_password }}"
                test:
                  password: "{{ patroni_test_password }}"
              tables:
                BlaDB_table1:
                  columns:
                    - Username character varying(50) NOT NULL
                    - CountryId integer NOT NULL
                  source_schema: bladb_source_schema
                  remote_schema: bladb_remote_schema

- name: Run nephelaiio.patroni.fdw playbook
  ansible.builtin.import_playbook: nephelaiio.patroni.fdw

- name: Import verify playbook
  ansible.builtin.import_playbook: ./verify.yml

- name: Override Foreign Data Wrapper data
  hosts: all
  vars_files:
    - ../../../playbooks/vars/main.yml
  tasks:
    - name: Override fdw fact
      ansible.builtin.set_fact:
        patroni_cluster_fdw:
          remote_molecule:
            - source: "{{ patroni_molecule_database }}"
              users:
                molecule:
                  password: "{{ patroni_molecule_password }}"
                test:
                  password: "{{ patroni_test_password }}"
              tables:
                molecule_table1:
                  columns:
                    - Username character varying(50) NOT NULL
                    - CountryId integer NOT NULL
            - source: "{{ patroni_test_database }}"
              users:
                test:
                  password: "{{ patroni_test_password }}"
              tables:
                molecule_table3:
                  columns:
                    - Username character varying(50) NOT NULL
                    - CountryId integer NOT NULL
          remote_BlaDB:
            - source: "{{ patroni_bladb_database }}"
              state: absent
              users:
                molecule:
                  password: "{{ patroni_molecule_password }}"
                test:
                  password: "{{ patroni_test_password }}"
              tables:
                BlaDB_table1:
                  columns:
                    - Username character varying(50) NOT NULL
                    - CountryId integer NOT NULL
                  source_schema: bladb_source_schema
                  remote_schema: bladb_remote_schema

- name: Run nephelaiio.patroni.fdw playbook
  ansible.builtin.import_playbook: nephelaiio.patroni.fdw

- name: Import verify playbook
  ansible.builtin.import_playbook: ./verify.yml
